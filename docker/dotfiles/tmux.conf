# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using e and o
unbind '"'
unbind %
bind e split-window -h -c '#{pane_current_path}'  # Split panes horizontal
bind o split-window -v -c '#{pane_current_path}'  # Split panes vertically

# switch panes using Alt-arrow without prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Mouse off: let the terminal own selection so drag-copy/paste works natively
# (Warp's native selection, like screen). Trade-off: scroll with prefix + [.
set -g mouse off

# Big scrollback per pane (~100K lines, ~10MB). Default is 2000.
set -g history-limit 100000

# Sync tmux copy-buffer to system clipboard via OSC 52 — works locally and over ssh.
set -g set-clipboard on

# don't let programs rename windows via escape sequences
set-option -g allow-rename off

# auto-name windows after the current directory, not the running command
set-option -g automatic-rename-format '#{?pane_in_mode,[tmux],#{b:pane_current_path}}#{?pane_dead,[dead],}'

# True color: modern terminfo + RGB override so 24-bit color passes through
# from the parent terminal (Warp/iTerm/Terminal) → tmux → apps (bat, lazygit, etc).
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*:Tc"

# Quiet — no bells, flashes, activity highlighting
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Vim keybindings in copy mode: hjkl move, /? search, v selects, y copies.
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel

# --- Plugins (tpm) — install: prefix + I  |  update: prefix + U ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# Tokyo Night tweaks (all optional; comment any you don't want)
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style hsquare

# Initialize TPM — keep this at the very bottom of the file.
run '~/.tmux/plugins/tpm/tpm'
